<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexPrivacy Hub - Consultas de Protección de Datos</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header>
      <div class="logo">
        <img src="assets/logo.svg" alt="LexPrivacy Hub Logo">
      </div>
      <div class="header-actions">
        <!-- Optional header actions can go here -->
      </div>
    </header>

    <div class="ad-banner">
      <div class="ad-placeholder">Espacio Publicitario (Banner 728x90)</div>
    </div>

    <main class="main-content">
      <section class="chat-area">
        <div class="messages-container" id="chat-messages">
          <!-- Messages will be injected here by app.js -->
        </div>

        <div class="input-area">
          <div id="interaction-container">
            <!-- User inputs (text, buttons, file upload) will be rendered here -->
          </div>
        </div>
      </section>

      <aside class="ad-sidebar">
        <div class="ad-placeholder">Publicidad Relacionada</div>
        <div class="ad-placeholder">Servicios Profesionales</div>
        <div class="ad-placeholder">Formación RGPD</div>
      </aside>
    </main>

    <footer>
      <div class="copyright">
        &copy; 2023 LexPrivacy Hub. Reservados todos los derechos.
      </div>
      <div class="legal-links">
        <a href="#">Aviso Legal</a>
        <a href="#">Política de Privacidad</a>
        <a href="#">Política de Cookies</a>
      </div>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
